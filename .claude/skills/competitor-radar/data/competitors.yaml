# ---------- CONTENT PILLAR MATRIX (dùng cho gap-analysis) ----------
# Tổng hợp pillar mà các competitor đang phủ — phục vụ check OVER-SATURATED vs GAP nhanh.

pillar_saturation_index:
  # 5+ competitor làm: SATURATED — không nên copy
  saturated:
    - testimonial-hoc-vien-co-viec  # FUNiX, MindX, CodeGym, NIIT, FPT Poly, F8 đều làm
    - thong-bao-tuyen-sinh-khoa-moi  # gần như mọi page làm
    - le-tot-nghiep-event-recap
    - tips-lap-trinh-beginner-html-css  # F8, MindX, CodeGym đều làm — quá đông

  # 2-4 competitor: TRUNG BÌNH — vẫn làm được nếu có góc riêng
  medium:
    - roadmap-hoc-tu-0  # F8 mạnh nhất, vài page khác làm thường
    - career-advice-interview-tips  # ITviec mạnh, Coders X có chút
    - trend-ngành-AI  # TopDev, Got It, MindX (mức cơ bản)
    - lifestyle-sinh-vien-it  # FPT Poly, MindX

  # 0-1 competitor: GAP — đáng khai thác
  gap:
    - content-cho-dev-da-di-lam-muon-nang-cap-mid  # gần như chỉ ITviec phủ một phần
    - so-sanh-tool-framework-deep-dive  # gần như không có ai làm chuyên
    - tutorial-AI-tool-cho-dev-fresher  # gap lớn 2026 — AI coding tool nhưng nhắm fresher
    - case-study-luong-thuc-te-cua-1-dev-co-the  # ITviec làm aggregate stats nhưng không story cá nhân
    - phong-van-recruiter-it-vn-ho-tim-gi-trong-cv  # gap — nhìn từ phía HR/recruiter
    - parent-content-cha-me-tu-van-con-hoc-it  # MindX có chút, gap rộng
    - viet-cv-portfolio-deploy-thuc-te-step-by-step  # nhiều bài lý thuyết, ít hand-holding thực hành
    - mental-health-burnout-cho-dev-fresher  # gap hoàn toàn
    - chuyen-nganh-tuoi-30-can-gi  # FUNiX có nhưng góc heavy-promote, gap góc thực tế / brutal honesty
